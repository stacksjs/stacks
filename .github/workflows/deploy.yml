name: Deploy

# Push-to-deploy, branch → environment (driver-agnostic — works with whatever
# ts-cloud driver config/cloud.ts declares: Hetzner, AWS, …):
#   main  → production   (bare apex domains)
#   stage → staging      (staging.<domain>)
#   dev   → development  (dev.<domain>)
#
# The branch↔environment map mirrors config/cloud.ts (each environment's
# `deployBranch`). `buddy deploy --<env>` selects the configured driver; the
# credentials for every supported driver are wired below and the unused ones are
# simply empty. Server drivers (Hetzner/EC2) use DEPLOY_SSH_KEY; serverless/AWS
# uses the AWS credentials. Set only the secrets your driver needs.
on:
  push:
    branches: [main, stage, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        options: [production, staging, development]
        default: staging

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.map.outputs.environment }}
      flag: ${{ steps.map.outputs.flag }}
    steps:
      - id: map
        run: |
          case "${{ github.event.inputs.environment || github.ref_name }}" in
            production|main)  echo "environment=production"  >> "$GITHUB_OUTPUT"; echo "flag=--prod"    >> "$GITHUB_OUTPUT" ;;
            staging|stage)    echo "environment=staging"     >> "$GITHUB_OUTPUT"; echo "flag=--staging" >> "$GITHUB_OUTPUT" ;;
            development|dev)  echo "environment=development" >> "$GITHUB_OUTPUT"; echo "flag=--dev"     >> "$GITHUB_OUTPUT" ;;
            *) echo "No environment mapped for ${{ github.ref_name }}"; exit 1 ;;
          esac

  deploy:
    needs: determine-environment
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.determine-environment.outputs.environment }}
    permissions:
      contents: read
      deployments: write
      id-token: write   # AWS OIDC role assumption (harmless for other drivers)
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Server drivers (Hetzner / bare EC2) deploy over SSH. No-op when no key is
      # set (a serverless/AWS-Lambda driver needs no SSH). Guarded in-shell
      # because `secrets.*` cannot be used in a step `if:` condition.
      - name: Add deploy SSH key
        run: |
          if [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
            # ts-cloud reads the .pub too (registers it with the provider / SSH);
            # derive it from the private key so only one secret is needed.
            ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
            chmod 644 ~/.ssh/id_ed25519.pub
          fi

      # AWS drivers: assume a role via OIDC when the AWS_ROLE_ARN repo *variable*
      # is set (vars — not secrets — are allowed in `if:`). No-op for Hetzner.
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy (${{ needs.determine-environment.outputs.environment }})
        run: ./buddy deploy ${{ needs.determine-environment.outputs.flag }} --yes
        env:
          # Selects .env.<environment> for the env core + the per-app secrets the
          # config resolves (so staging/dev use their own APP_KEY, DB, Stripe, …).
          APP_ENV: ${{ needs.determine-environment.outputs.environment }}
          # dotenvx/@stacksjs/env keys to decrypt .env.<environment> (all drivers).
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          DOTENV_PRIVATE_KEY_STAGING: ${{ secrets.DOTENV_PRIVATE_KEY_STAGING }}
          DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
          # ts-cloud records a GitHub Deployment against the environment above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # DNS provider (apex/www + <prefix>.<domain> records). Any provider ts-cloud
          # supports; set the ones you use.
          PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
          PORKBUN_SECRET_KEY: ${{ secrets.PORKBUN_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # --- Hetzner driver ---
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          # --- AWS driver (static keys; omit if using AWS_ROLE_ARN OIDC above) ---
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          COPYFILE_DISABLE: '1'
