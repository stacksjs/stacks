name: Releaser

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: pantry-pm/pantry/packages/action@d8d4e2f15c871e9ee3c59ab10a4974c21c5fd182 # v0.10.40
        with:
          version: '0.10.40'

      - name: Use Cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun install

      # Build each publishable framework package's dist BEFORE publishing.
      # We publish with `pantry --ignore-scripts` (skips prepublishOnly `tsc`
      # steps that fail in-workspace), so dist must already exist here.
      - name: Build framework packages
        run: |
          failed=""
          for dir in storage/framework/core/*/ storage/framework/core; do
            pkg="${dir%/}/package.json"
            [ -f "$pkg" ] || continue
            grep -q '"private": *true' "$pkg" && continue
            grep -q '"build"' "$pkg" || continue
            echo "Building ${dir%/}"
            if (cd "${dir%/}" && bun run build); then :; else
              echo "::error::build failed for ${dir%/}"
              failed="${failed} ${dir%/}"
            fi
          done
          # Fail the release on ANY build failure — a swallowed failure here is
          # exactly how 0.70.88 shipped dist-less (publish runs --ignore-scripts,
          # so a missing dist is never rebuilt).
          if [ -n "$failed" ]; then
            echo "::error::One or more package builds failed:${failed}"
            exit 1
          fi

      # Belt-and-suspenders against a dist-less publish: every publishable
      # package must have a non-empty dist/ (at least one .js) before we publish
      # with --ignore-scripts. A build that "succeeds" but emits nothing is
      # caught here instead of shipping an empty tarball to npm.
      - name: Verify built dist
        run: |
          missing=""
          for dir in storage/framework/core/*/ storage/framework/core; do
            pkg="${dir%/}/package.json"
            [ -f "$pkg" ] || continue
            grep -q '"private": *true' "$pkg" && continue
            grep -q '"build"' "$pkg" || continue
            # Packages that intentionally ship no JS dist: the `stacks` meta
            # (its exports point at sibling packages' dist), `defaults` (ships
            # resources/app, not dist), and `lint` (config only, no-op build).
            case "${dir%/}" in
              storage/framework/core|storage/framework/core/defaults|storage/framework/core/lint) continue ;;
            esac
            if [ -z "$(find "${dir%/}/dist" -name '*.js' -type f 2>/dev/null | head -1)" ]; then
              echo "::error::no built dist/*.js for ${dir%/}"
              missing="${missing} ${dir%/}"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Refusing to publish — dist missing for:${missing}"
            exit 1
          fi

      # Publish the whole framework workspace via pantry: every core/* member
      # AND the `stacks` meta-package (storage/framework/core) — the meta the
      # old bash script never published. pantry resolves workspace:* → concrete
      # versions, topo-orders, skips already-published versions, and
      # authenticates via npm trusted publishing (OIDC; id-token: write above),
      # falling back to NPM_TOKEN outside OIDC.
      - name: Publish Framework
        run: pantry publish --npm --access public --ignore-scripts 'storage/framework/core/*' 'storage/framework/core'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publishing succeeded is not enough: registry manifests can still carry
      # monorepo-only protocols that make the package impossible to install.
      # Exercise the public artifact from a clean, non-workspace directory.
      - name: Verify published framework install
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          smoke_dir="$(mktemp -d)"
          trap 'rm -rf "$smoke_dir"' EXIT
          cd "$smoke_dir"
          echo '{"name":"stacks-release-smoke","private":true}' > package.json
          installed=false
          for attempt in 1 2 3 4 5 6; do
            # A package published near the end of the workspace can still be
            # absent from registry metadata cached by the first failed install.
            # Force each retry to fetch fresh manifests so eventual consistency
            # can recover without turning a successful publish into a false
            # release failure.
            if bun add --no-cache "stacks@$version"; then
              installed=true
              break
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "::error::stacks@$version is published but cannot be installed from a clean project"
              exit 1
            fi
            sleep 10
          done
          if [ "$installed" != true ]; then
            exit 1
          fi
          bun node_modules/@stacksjs/buddy/dist/cli.js --help >/dev/null

      - name: Publish Dummy Libraries
        run: ./storage/framework/scripts/publish-dummy-libs
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish VS Code Extension
        continue-on-error: true
        run: |
          cd storage/framework/defaults/ide/vscode
          bun install
          bunx --bun vsce publish --no-dependencies
          cd ../../../../
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Extract tag version
        id: get_version
        run: |
          version=${GITHUB_REF#refs/tags/}
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build Buddy Release Assets
        run: |
          cd storage/framework/core/buddy
          bun run compile:all
          bun run zip:all

      - name: Create GitHub Release
        uses: pantry-pm/pantry/packages/action@d8d4e2f15c871e9ee3c59ab10a4974c21c5fd182 # v0.10.40
        with:
          version: '0.10.40'
          install: 'false'
          release: 'true'
          release-tag: ${{ steps.get_version.outputs.version }}
          release-files: |
            storage/framework/core/buddy/bin/buddy-linux-x64.zip
            storage/framework/core/buddy/bin/buddy-linux-arm64.zip
            storage/framework/core/buddy/bin/buddy-windows-x64.zip
            storage/framework/core/buddy/bin/buddy-darwin-x64.zip
            storage/framework/core/buddy/bin/buddy-darwin-arm64.zip
          release-changelog: auto
          release-token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: npm
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Debug Tag
        run: |
          echo "Tag: ${GITHUB_REF#refs/tags/}"
          echo "Version from previous job: ${{ needs.npm.outputs.version }}"

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: stacksjs
          repositories: homebrew-tap

      - name: Setup GitHub CLI with PAT
        run: |
          echo "${{ secrets.GH_PAT }}" | gh auth login --with-token

      - name: Ensure Homebrew Tap Repository Exists
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          tap_ready=false
          for attempt in $(seq 1 240); do
            if output=$(gh api repos/stacksjs/homebrew-tap 2>&1); then
              tap_ready=true
              echo "homebrew-tap repository already exists"
              break
            fi

            if echo "$output" | grep -q 'HTTP 404'; then
              echo "Creating homebrew-tap repository..."
              if gh repo create stacksjs/homebrew-tap --public --description "Homebrew tap for Stacks packages"; then
                tap_ready=true
                break
              fi
              echo "::warning::Repository creation was not confirmed; reconciling before retry"
            else
              echo "::warning::Homebrew tap lookup failed transiently; retrying (attempt $attempt/240)"
            fi

            delay=$((attempt < 7 ? attempt * 5 : 30))
            sleep "$delay"
          done

          if [ "$tap_ready" != true ]; then
            echo "::error::Could not confirm the Homebrew tap after extended retries"
            exit 1
          fi

      - name: Authenticate GitHub CLI with App Token
        run: echo "${{ steps.generate-token.outputs.token }}" | gh auth login --with-token

      - name: Wait for Release Assets
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Waiting for release assets to be available..."

          # Wait for assets to be available (max 10 minutes)
          TIMEOUT=600
          START_TIME=$(date +%s)

          while [ $(( $(date +%s) - START_TIME )) -lt $TIMEOUT ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://github.com/stacksjs/stacks/releases/download/$VERSION/buddy-darwin-arm64.zip)
            echo "HTTP response code: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "Assets are available!"
              break
            fi

            echo "Assets not ready yet, waiting 10 seconds..."
            sleep 10
          done

          if [ $(( $(date +%s) - START_TIME )) -ge $TIMEOUT ]; then
            echo "Timed out waiting for assets, proceeding anyway..."
          fi

          # Force continue even if we couldn't detect the file
          # Sometimes GitHub's API can be inconsistent
          echo "Continuing with asset download..."

      - name: Download Binaries Directly
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p .github/temp
          cd .github/temp

          # Try direct download with retries
          download_with_retry() {
            local url=$1
            local output=$2
            local max_retries=5
            local retry=0

            while [ $retry -lt $max_retries ]; do
              echo "Downloading $url (attempt $(($retry + 1))/$max_retries)"
              if curl -L -s -f "$url" -o "$output"; then
                echo "Downloaded $output successfully"
                return 0
              fi
              echo "Download failed, retrying in 5 seconds..."
              retry=$((retry + 1))
              sleep 5
            done

            echo "Failed to download $url after $max_retries attempts"
            return 1
          }

          download_with_retry "https://github.com/stacksjs/stacks/releases/download/$VERSION/buddy-darwin-arm64.zip" "buddy-darwin-arm64.zip"
          download_with_retry "https://github.com/stacksjs/stacks/releases/download/$VERSION/buddy-darwin-x64.zip" "buddy-darwin-x64.zip"
          download_with_retry "https://github.com/stacksjs/stacks/releases/download/$VERSION/buddy-linux-arm64.zip" "buddy-linux-arm64.zip"
          download_with_retry "https://github.com/stacksjs/stacks/releases/download/$VERSION/buddy-linux-x64.zip" "buddy-linux-x64.zip"

          cd ../..

      - name: Update Homebrew Formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          bash .github/scripts/update-homebrew-formula.sh $VERSION

      - name: Push to Homebrew Tap Repository
        run: |
          # Clone the tap repo using GitHub App token
          git clone https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/stacksjs/homebrew-tap.git

          # Set up Git config
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy the formula to the tap repo
          mkdir -p Formula
          cp ../.github/homebrew/stacks.rb Formula/

          # Check if there are changes to commit
          if git status --porcelain | grep -q .; then
            # Push the changes to the tap repo
            git add Formula/stacks.rb
            git commit -m "chore: update stacks formula to ${GITHUB_REF#refs/tags/}"
            git push
            echo "Successfully updated homebrew formula!"
          else
            echo "No changes to commit"
          fi
