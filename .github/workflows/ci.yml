name: CI

on:
  push:
    branches:
      - main
      - stage
      - dev

    tags:
      - '*-beta.*'

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy after CI passes
        type: choice
        options:
          - production
          - staging
          - development
        default: staging

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check dependency state
        env:
          DEPENDENCY_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          DEPENDENCY_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun scripts/check-dependency-commits.ts

      - name: Lint
        run: bun buddy lint

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306

      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Test Suite
        env:
          AWS_DYNAMODB_ENDPOINT: http://localhost:8000
        run: bun run test

  protocol-conformance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Verify pinned protocol suite
        run: |
          bun run protocol:check
          bun run protocol:manifest:check
          bun run protocol:release:check
          bun run protocol:drivers:check
          bun run protocol:desktop:check
          bun run docs:buddy:check

      - name: Run protocol adapter
        env:
          PROTOCOL_REPORT_DIR: protocol/reports
        run: |
          bun test scripts/protocol/run-conformance.test.ts
          bun run protocol:conformance
          cat protocol/reports/stacks-conformance.md >> "$GITHUB_STEP_SUMMARY"

      - name: Retain attributable conformance report
        uses: actions/upload-artifact@v4
        with:
          name: stacks-protocol-conformance-${{ github.sha }}
          path: protocol/reports/
          if-no-files-found: error

  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/stage' ||
        github.ref == 'refs/heads/dev' ||
        (startsWith(github.ref, 'refs/tags/') && contains(github.ref, '-beta.'))
      ))
    needs: [lint, typecheck, test, protocol-conformance]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref == 'refs/heads/dev' && 'development' || (github.ref == 'refs/heads/stage' || startsWith(github.ref, 'refs/tags/')) && 'staging' || 'production' }}
    permissions:
      contents: read
      deployments: write
      id-token: write
    env:
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref == 'refs/heads/dev' && 'development' || (github.ref == 'refs/heads/stage' || startsWith(github.ref, 'refs/tags/')) && 'staging' || 'production' }}
      DEPLOY_FLAG: ${{ ((github.event_name == 'workflow_dispatch' && inputs.environment == 'development') || github.ref == 'refs/heads/dev') && '--dev' || ((github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') || github.ref == 'refs/heads/stage' || startsWith(github.ref, 'refs/tags/')) && '--staging' || '--prod' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Prepare Deploy SSH Key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "No deploy SSH key configured; continuing without one."
            exit 0
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub
          chmod 644 ~/.ssh/id_ed25519.pub

      - name: Deploy ${{ env.DEPLOY_ENVIRONMENT }}
        run: ./buddy deploy "$DEPLOY_FLAG" --yes
        env:
          APP_ENV: ${{ env.DEPLOY_ENVIRONMENT }}
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
          DOTENV_PRIVATE_KEY_STAGING: ${{ secrets.DOTENV_PRIVATE_KEY_STAGING }}
          DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPYFILE_DISABLE: '1'

  publish-commit:
    if: github.event_name == 'pull_request'
    needs: [lint, typecheck, test, protocol-conformance]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Use cached node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish Commit
        run: ./storage/framework/scripts/publish-commit
