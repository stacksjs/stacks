name: Desktop Lifecycle

on:
  push:
    branches: [main]
    paths:
      - storage/framework/core/desktop/**
      - scripts/protocol/craft-evidence.ts
      - scripts/protocol/desktop-lifecycle-report.ts
      - protocol/evidence/craft.json
      - .github/workflows/desktop-lifecycle.yml
  pull_request:
    branches: [main]
    paths:
      - storage/framework/core/desktop/**
      - scripts/protocol/craft-evidence.ts
      - scripts/protocol/desktop-lifecycle-report.ts
      - protocol/evidence/craft.json
      - .github/workflows/desktop-lifecycle.yml
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CRAFT_SOURCE_REVISION: c27c3adace4d1a4de4fe4ecf0e7c7e48264bbf3e

jobs:
  lifecycle:
    name: ${{ matrix.name }} install/update/rollback
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            name: darwin-arm64
            platform: darwin
            architecture: arm64
            formats: dmg,pkg
          - os: macos-15-intel
            name: darwin-x64
            platform: darwin
            architecture: x64
            formats: dmg,pkg
          - os: ubuntu-24.04
            name: linux-x64
            platform: linux
            architecture: x64
            formats: deb
          - os: windows-2025
            name: win32-x64
            platform: win32
            architecture: x64
            formats: msi,zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    env:
      CRAFT_EVIDENCE_LABEL: ${{ matrix.name }}

    steps:
      - name: Checkout Stacks
        uses: actions/checkout@v6

      - name: Checkout pinned Craft source
        uses: actions/checkout@v6
        with:
          repository: home-lang/craft
          ref: ${{ env.CRAFT_SOURCE_REVISION }}
          path: .craft-contract

      - name: Setup Pantry
        uses: pantry-pm/pantry/packages/action@c5e15260ccde34206082756a14d03e30cf1d7d5e # v0.10.43
        with:
          version: '0.10.43'
          install: 'false'

      - name: Install Stacks dependencies
        run: bun install --frozen-lockfile

      - name: Install Craft dependencies
        working-directory: .craft-contract
        run: bun install --frozen-lockfile

      - name: Install WiX Toolset v3
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.14.1 --yes --no-progress
          $bin = Get-ChildItem "${env:ProgramFiles(x86)}\WiX Toolset v3*\bin" -Directory | Select-Object -First 1
          if (-not $bin) { throw 'WiX Toolset bin directory not found' }
          $bin.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify immutable Craft checkout
        run: test "$(git -C .craft-contract rev-parse HEAD)" = "$CRAFT_SOURCE_REVISION"

      - name: Exercise native package lifecycle
        working-directory: .craft-contract
        run: bun scripts/native-lifecycle.ts --install

      - name: Verify Stacks update security contracts
        run: bun test storage/framework/core/desktop/tests/invites-updater.test.ts

      - name: Validate and attest lifecycle report
        run: >-
          bun scripts/protocol/desktop-lifecycle-report.ts
          --report .craft-contract/artifacts/native-lifecycle/${{ matrix.name }}/report.json
          --output protocol/reports/desktop/${{ matrix.name }}/attestation.json
          --revision "$CRAFT_SOURCE_REVISION"
          --platform ${{ matrix.platform }}
          --architecture ${{ matrix.architecture }}
          --formats ${{ matrix.formats }}

      - name: Upload native lifecycle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stacks-desktop-lifecycle-${{ matrix.name }}-${{ github.sha }}
          path: |
            .craft-contract/artifacts/native-lifecycle/${{ matrix.name }}/report.json
            .craft-contract/artifacts/native-lifecycle/${{ matrix.name }}/work/packages-*/**
            protocol/reports/desktop/${{ matrix.name }}/attestation.json
          if-no-files-found: error
          retention-days: 90
