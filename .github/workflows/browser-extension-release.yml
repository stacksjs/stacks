name: Publish browser extension

on:
  workflow_call:
    inputs:
      chrome-publisher-id:
        description: Chrome Web Store publisher ID
        required: true
        type: string
      safari-enabled:
        description: Build and upload the Safari container app
        default: false
        required: false
        type: boolean
      publish-stores:
        description: Publish Chrome, Firefox, and enabled Safari builds
        default: true
        required: false
        type: boolean
      publish-chrome:
        description: Publish or retry the Chrome Web Store release
        default: true
        required: false
        type: boolean
      publish-firefox:
        description: Publish or retry the Firefox Add-ons release
        default: true
        required: false
        type: boolean
      publish-safari:
        description: Publish or retry the Safari App Store release
        default: true
        required: false
        type: boolean
      release-tag:
        description: GitHub release tag; defaults to the pushed tag or v<package.json version>
        default: ''
        required: false
        type: string
    secrets:
      CHROME_WEB_STORE_SERVICE_ACCOUNT_JSON:
        description: Chrome Web Store service account JSON
        required: false
      AMO_JWT_ISSUER:
        description: Mozilla Add-ons API JWT issuer
        required: false
      AMO_JWT_SECRET:
        description: Mozilla Add-ons API JWT secret
        required: false
      APP_STORE_CONNECT_API_KEY:
        description: App Store Connect API private key contents
        required: false
      APP_STORE_CONNECT_API_KEY_ID:
        description: App Store Connect API key ID
        required: false
      APP_STORE_CONNECT_API_ISSUER_ID:
        description: App Store Connect API issuer ID
        required: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release-tag || github.ref }}

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build store packages
        run: bun node_modules/@stacksjs/buddy/dist/cli.js extension:package

      - name: Upload validated packages
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-packages
          path: '*.zip'
          if-no-files-found: error

  publish-chrome:
    if: inputs.publish-stores && inputs.publish-chrome
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release-tag || github.ref }}

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Chrome Web Store credentials
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.CHROME_WEB_STORE_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$SERVICE_ACCOUNT_JSON"
          printf '%s' "$SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/chrome-web-store-service-account.json"
          chmod 600 "$RUNNER_TEMP/chrome-web-store-service-account.json"

      - name: Publish Chrome extension
        env:
          CHROME_WEB_STORE_PUBLISHER_ID: ${{ inputs.chrome-publisher-id }}
          CHROME_WEB_STORE_SERVICE_ACCOUNT_PATH: ${{ runner.temp }}/chrome-web-store-service-account.json
        run: |
          test -n "$CHROME_WEB_STORE_PUBLISHER_ID"
          bun node_modules/@stacksjs/buddy/dist/cli.js extension:chrome:publish

  publish-firefox:
    if: inputs.publish-stores && inputs.publish-firefox
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release-tag || github.ref }}

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Archive human-readable source
        run: git archive --format=zip --output "$RUNNER_TEMP/browser-extension-source.zip" HEAD

      - name: Publish Firefox extension
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          test -n "$AMO_JWT_ISSUER"
          test -n "$AMO_JWT_SECRET"
          bun node_modules/@stacksjs/buddy/dist/cli.js extension:firefox:publish --source-code "$RUNNER_TEMP/browser-extension-source.zip"

  publish-safari:
    if: inputs.publish-stores && inputs.publish-safari && inputs.safari-enabled
    needs: validate
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release-tag || github.ref }}

      - name: Select stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure App Store Connect credentials
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          test -n "$APP_STORE_CONNECT_API_KEY"
          printf '%s\n' "$APP_STORE_CONNECT_API_KEY" > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"

      - name: Publish Safari extension
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: |
          test -n "$APP_STORE_CONNECT_API_KEY_ID"
          test -n "$APP_STORE_CONNECT_API_ISSUER_ID"
          bun node_modules/@stacksjs/buddy/dist/cli.js extension:safari:publish

  github-release:
    if: >-
      needs.validate.result == 'success' &&
      (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release-tag || github.ref }}

      - name: Download validated packages
        uses: actions/download-artifact@v4
        with:
          name: browser-extension-packages
          path: release-artifacts

      - name: Resolve release tag
        id: release
        env:
          REQUESTED_TAG: ${{ inputs.release-tag }}
        run: |
          if test -n "$REQUESTED_TAG"; then
            tag="$REQUESTED_TAG"
          elif test "$GITHUB_REF_TYPE" = "tag"; then
            tag="$GITHUB_REF_NAME"
          else
            version="$(node -p "require('./package.json').version")"
            test -n "$version"
            tag="v${version#v}"
          fi

          if ! git rev-parse --verify --quiet "refs/tags/$tag^{commit}" >/dev/null; then
            echo "::error::Release tag '$tag' does not exist. Push the tag first or pass release-tag."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: home-lang/pantry/packages/action@main
        with:
          install: 'false'
          release: 'true'
          release-tag: ${{ steps.release.outputs.tag }}
          release-changelog: auto
          release-checksums: 'true'
          release-files: release-artifacts/*.zip
          release-token: ${{ github.token }}
