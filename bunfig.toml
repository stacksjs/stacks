# preload these modules before running bun.
#
# Order matters:
#   1. env plugin auto-loads `.env` and decrypts dotenvx-style encrypted
#      values (stacksjs/stacks#1053) so the rest of the boot chain — config
#      loader, preloader, user routes — reads plaintext from process.env.
#   2. main preloader wires auto-imports + framework plugins; safe to run
#      after the env layer because it can now read decrypted secrets too.
preload = [
  "./storage/framework/core/env/plugin.ts",
  "./storage/framework/defaults/resources/plugins/preloader.ts",
]

[test]
# Tests also get the env layer so encrypted .env values resolve during the
# suite — match production boot semantics rather than papering over a
# different decrypt path in test-only code.
preload = [
  "./storage/framework/core/env/plugin.ts",
  "./tests/setup.ts",
]
coverage = false

[run]
# equivalent to `bun --bun` for all `bun run` commands
bun = true

[serve.static]
plugins = [ "bun-plugin-stx" ]

[install]
registry = { url = "https://registry.npmjs.org/", token = "$BUN_AUTH_TOKEN" }
linker = "hoisted"
